  <script>
    const PAGE_URL = 'https://thinking.zcod3.com/frases-fuertes.html';

    function descargar(src, filename) {
      fetch(src)
        .then(r => r.blob())
        .then(blob => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        });
    }

    function compartirWa(titulo) {
      const texto = `${titulo}\n\nMás frases en: ${PAGE_URL}`;
      if (navigator.share) {
        navigator.share({ title: titulo, text: texto, url: PAGE_URL }).catch(() => {});
      } else {
        window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
      }
    }

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
